services:
  - type: web
    name: this-day-then-voice
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeployTrigger: commit
    envVars:
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://thisdaythen.com/api/auth/google/callback
      - key: CANONICAL_HOST
        value: thisdaythen.com
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
    domains:
      - thisdaythen.com
      - www.thisdaythen.com
