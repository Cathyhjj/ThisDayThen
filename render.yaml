databases:
  - name: this-day-then-db
    plan: free
    databaseName: this_day_then
    user: this_day_then
    region: oregon

services:
  - type: web
    name: this-day-then-voice
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeployTrigger: commit
    envVars:
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://thisdaythen.com/api/auth/google/callback
      - key: CANONICAL_HOST
        value: thisdaythen.com
      - key: DATABASE_URL
        fromDatabase:
          name: this-day-then-db
          property: connectionString
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: VOICE_MODE
        value: openai-realtime
      - key: OPENAI_TTS_MODEL
        value: gpt-4o-mini-tts
      - key: OPENAI_TTS_VOICE
        value: fable
      - key: OPENAI_REALTIME_MODEL
        value: gpt-realtime-2
      - key: OPENAI_REALTIME_VOICE
        value: coral
    domains:
      - thisdaythen.com
      - www.thisdaythen.com
