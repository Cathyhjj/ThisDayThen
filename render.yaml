services:
  - type: web
    name: this-day-then
    runtime: node
    plan: starter
    region: ohio
    repo: https://github.com/Cathyhjj/ThisDayThen
    branch: codex/chic-redesign
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /
    autoDeployTrigger: commit
    envVars:
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://thisdaythen.com/api/auth/google/callback
      - key: CANONICAL_HOST
        value: thisdaythen.com
      - key: DATABASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: VOICE_MODE
        value: openai-realtime
      - key: OPENAI_TTS_MODEL
        value: gpt-4o-mini-tts
      - key: OPENAI_TTS_VOICE
        value: fable
      - key: OPENAI_REALTIME_MODEL
        value: gpt-realtime
      - key: OPENAI_REALTIME_VOICE
        value: alloy
      - key: OPENAI_SUMMARY_MODEL
        value: gpt-5.5
      - key: OPENAI_SUMMARY_FALLBACK_MODEL
        value: gpt-4.1-mini
