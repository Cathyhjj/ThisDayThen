<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>This Day Then</title>
    <meta
      name="description"
      content="A calm five-line journal where a warm AI friend helps you remember this date across years."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <canvas id="breathCanvas" class="breath-canvas" aria-hidden="true"></canvas>
    <div class="ambient-vectors" aria-hidden="true">
      <svg class="botanical-veil veil-left" viewBox="0 0 420 620" role="img">
        <path class="contour" d="M82 522C38 443 45 349 94 265C142 181 226 105 330 61" />
        <path class="contour thin" d="M54 472C85 392 142 322 226 262C292 214 342 163 374 108" />
        <path class="contour thin" d="M126 574C122 460 166 360 258 275C319 219 358 155 372 82" />
        <path class="stem" d="M146 544C210 421 250 310 267 212C276 160 296 111 328 65" />
        <path class="leaf" d="M245 278C182 256 143 205 130 126C206 136 252 182 267 264C260 272 253 277 245 278Z" />
        <path class="leaf leaf-two" d="M194 392C129 379 83 334 58 258C135 257 187 296 213 376C209 384 203 389 194 392Z" />
        <path class="leaf leaf-three" d="M292 188C252 156 238 106 251 37C309 66 335 112 323 178C314 184 304 188 292 188Z" />
      </svg>

      <svg class="botanical-veil veil-right" viewBox="0 0 520 560" role="img">
        <path class="contour" d="M432 76C478 159 471 254 414 337C355 424 259 483 132 512" />
        <path class="contour thin" d="M464 139C386 152 317 189 257 249C200 306 134 340 58 350" />
        <path class="stem" d="M420 86C345 194 298 284 279 358C266 406 233 454 180 501" />
        <path class="leaf" d="M279 355C343 344 394 379 434 460C356 470 301 443 269 378C270 369 273 362 279 355Z" />
        <path class="leaf leaf-two" d="M326 251C389 236 440 263 480 334C407 351 352 330 315 274C316 264 319 257 326 251Z" />
      </svg>
    </div>
    <main class="app-shell">
      <header class="topbar" aria-label="App header">
        <div class="topbar-copy">
          <p class="eyebrow">This Day Then</p>
          <h1>This day, then</h1>
        </div>
        <div class="topbar-art" aria-hidden="true">
          <svg class="journal-plant" viewBox="0 0 280 240">
            <path class="art-page back" d="M58 72L194 48C212 45 228 58 231 76L246 163C249 181 237 197 219 200L83 224C65 227 49 215 46 197L31 110C28 92 40 76 58 72Z" />
            <path class="art-page front" d="M75 46L211 70C229 73 241 90 238 108L223 195C220 213 203 225 185 222L49 198C31 195 19 178 22 160L37 73C40 55 57 43 75 46Z" />
            <path class="art-line" d="M72 94L175 112" />
            <path class="art-line short" d="M66 129L191 151" />
            <path class="art-line" d="M61 163L152 179" />
            <path class="art-stem" d="M148 202C166 153 164 111 141 78" />
            <path class="art-leaf" d="M151 152C116 144 96 119 91 78C131 86 154 110 162 149C159 151 155 153 151 152Z" />
            <path class="art-leaf alt" d="M162 119C189 105 211 110 231 134C202 150 178 148 160 127C159 124 160 121 162 119Z" />
          </svg>
          <span class="material-slip slip-one"></span>
          <span class="material-slip slip-two"></span>
        </div>
        <button class="icon-button" id="themeToggle" aria-label="Toggle deep forest mode" title="Theme">
          <span class="theme-mark" aria-hidden="true"></span>
        </button>
      </header>

      <section class="date-band" aria-labelledby="date-heading">
        <div>
          <p class="section-kicker">Selected date</p>
          <h2 id="date-heading">Today</h2>
        </div>
        <label class="date-picker">
          <span>Date</span>
          <input id="dateInput" type="date" />
        </label>
      </section>

      <nav class="tabs" aria-label="Main views">
        <button class="tab is-active" data-view="checkin">Check-in</button>
        <button class="tab" data-view="timeline">Five years</button>
        <button class="tab" data-view="archive">Archive</button>
      </nav>

      <section class="view is-visible" id="checkinView" aria-labelledby="checkin-title">
        <div class="conversation-panel audio-panel">
          <div class="panel-heading">
            <div>
              <p class="section-kicker">Live voice</p>
              <h2 id="checkin-title">A quiet conversation</h2>
            </div>
            <button class="text-button" id="resetChat">Begin again</button>
          </div>

          <div class="voice-stage" data-voice-state="idle">
            <div class="stage-materials" aria-hidden="true">
              <svg class="ripple-map" viewBox="0 0 520 360">
                <path d="M36 188C92 121 170 89 270 92C365 95 439 132 484 204" />
                <path d="M72 223C127 170 194 146 273 151C350 155 411 184 456 239" />
                <path d="M98 154C151 124 214 110 286 116C352 121 405 144 446 185" />
                <path d="M132 259C183 236 235 228 289 235C341 242 384 263 418 298" />
              </svg>
              <span class="pressed-leaf leaf-a"></span>
              <span class="pressed-leaf leaf-b"></span>
              <span class="memory-slip stage-slip-a"></span>
              <span class="memory-slip stage-slip-b"></span>
            </div>
            <button class="voice-orb" id="voiceOrb" type="button" aria-label="Start live audio check-in">
              <span class="orb-ring ring-one"></span>
              <span class="orb-ring ring-two"></span>
              <span class="orb-ring ring-three"></span>
              <span class="orb-core">
                <span class="orb-symbol" aria-hidden="true"></span>
              </span>
            </button>
            <div class="voice-status">
              <p class="voice-state" id="voiceState">Ready when you are</p>
              <p class="voice-hint" id="voiceHint">Tap the orb and speak naturally. She will listen, pause, and ask the next gentle question.</p>
            </div>
          </div>

          <div class="voice-controls">
            <button class="primary-button" id="startVoice" type="button">Start live voice</button>
            <button class="secondary-button" id="finishVoice" type="button">Finish and draft</button>
          </div>

          <div class="sound-bars" id="soundBars" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>

          <div class="transcript-pocket">
            <button class="text-button" id="toggleTranscript" type="button">Show quiet transcript</button>
            <div class="messages" id="messages" aria-live="polite" hidden></div>
          </div>

          <form class="composer sr-only" id="composer">
            <label for="messageInput">Reply to your daily friend</label>
            <textarea id="messageInput" rows="3"></textarea>
            <button type="submit">Send</button>
          </form>
        </div>

        <div class="summary-panel">
          <div class="panel-heading">
            <div>
              <p class="section-kicker">Five lines</p>
              <h2>Today's memory</h2>
            </div>
            <button class="text-button" id="generateSummary">Draft</button>
          </div>
          <textarea id="summaryEditor" class="summary-editor" rows="8" placeholder="Your five-line summary will appear here."></textarea>
          <div class="summary-actions">
            <button class="secondary-button" id="regenerateSummary" type="button">Regenerate</button>
            <button class="primary-button" id="saveSummary" type="button">Save five lines</button>
          </div>
        </div>
      </section>

      <section class="view" id="timelineView" aria-labelledby="timeline-title">
        <div class="timeline-heading">
          <div>
            <p class="section-kicker">Same date</p>
            <h2 id="timeline-title">Five years together</h2>
          </div>
          <div class="heading-actions">
            <button class="secondary-button compact" id="timelineSeedDemoData">Sample years</button>
            <button class="primary-button compact" id="compareYears">Reflect</button>
          </div>
        </div>

        <div class="year-stack" id="yearStack"></div>
        <aside class="reflection" id="reflectionBox" hidden></aside>
      </section>

      <section class="view" id="archiveView" aria-labelledby="archive-title">
        <div class="timeline-heading">
          <div>
            <p class="section-kicker">Archive</p>
            <h2 id="archive-title">Saved days</h2>
          </div>
          <button class="secondary-button compact" id="seedDemoData">Add demo memories</button>
        </div>
        <div class="archive-list" id="archiveList"></div>
      </section>
    </main>

    <script src="this-day-then.js"></script>
  </body>
</html>
